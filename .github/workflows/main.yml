name: Daily YouTube Shorts — Video Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# VIDEO PIPELINE — runs at slots 1, 3, 5  (real Pexels/Pixabay footage)
#
# Slot 1 —  5:00 AM IST = 23:30 UTC (prev day)
# Slot 3 —  1:30 PM IST = 08:00 UTC
# Slot 5 —  8:30 PM IST = 15:00 UTC
#
# Total: 3 video shorts per day
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Slot 1:  5:00 AM IST (23:30 UTC)
    - cron: "30 23 * * *"
    # Slot 3:  1:30 PM IST (08:00 UTC)
    - cron: "0 8 * * *"
    # Slot 5:  8:30 PM IST (15:00 UTC)
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  upload-video:
    name: Generate & Upload 1 Video Short
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            fonts-liberation \
            fonts-noto \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-noto-extra

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write YouTube credentials from secrets
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          echo "$YOUTUBE_CLIENT_SECRETS" > client_secrets.json
          echo "$YOUTUBE_TOKEN"          > youtube_token.json

      - name: Run video-clip pipeline
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:   ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:  ${{ secrets.PIXABAY_API_KEY }}
          VIDEOS_PER_RUN:  "1"
          YOUTUBE_PRIVACY: "public"
        run: python main_video.py

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-short-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 3
          if-no-files-found: ignore

      - name: Remove credential files
        if: always()
        run: rm -f client_secrets.json youtube_token.json
