name: Daily YouTube Shorts Upload

# ─────────────────────────────────────────────────────────────────────────────
# UPLOAD SCHEDULE — 5 slots per day (IST = UTC + 5:30)
#
# Each slot runs BOTH pipelines sequentially in one job:
#   1. main.py        → 1 photo-based Short  (images + Ken Burns)
#   2. main_video.py  → 1 video-clip Short   (real Pexels/Pixabay footage)
#
# Slot 1 —  5:00 AM IST = 23:30 UTC (prev day)  early risers / morning aarti
# Slot 2 —  9:00 AM IST = 03:30 UTC             morning commute
# Slot 3 —  1:30 PM IST = 08:00 UTC             lunch break
# Slot 4 —  5:30 PM IST = 12:00 UTC             evening tea / school out
# Slot 5 —  8:30 PM IST = 15:00 UTC             prime time / family viewing
#
# Total: 10 videos per day — 5 photo + 5 video
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Slot 1:  5:00 AM IST (23:30 UTC)
    - cron: "30 23 * * *"
    # Slot 2:  9:00 AM IST (03:30 UTC)
    - cron: "30 3 * * *"
    # Slot 3:  1:30 PM IST (08:00 UTC)
    - cron: "0 8 * * *"
    # Slot 4:  5:30 PM IST (12:00 UTC)
    - cron: "0 12 * * *"
    # Slot 5:  8:30 PM IST (15:00 UTC)
    - cron: "0 15 * * *"
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  upload:
    name: Generate & Upload 1 Photo Short + 1 Video Short
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ───────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── System deps (FFmpeg + fonts including Hindi Devanagari) ─────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            fonts-liberation \
            fonts-noto \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-noto-extra

      # ── Python deps ───────────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Credentials ───────────────────────────────────────────────────────────
      - name: Write YouTube credentials from secrets
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          echo "$YOUTUBE_CLIENT_SECRETS" > client_secrets.json
          echo "$YOUTUBE_TOKEN"          > youtube_token.json

      # ── Step A: Photo-based Short (existing pipeline — unchanged) ─────────────
      - name: "[Photo] Run photo pipeline — 1 Short"
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY:  ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          VIDEOS_PER_RUN:  "1"
          YOUTUBE_PRIVACY: "public"
        run: python main.py

      # ── Step B: Video-clip Short (new pipeline) ───────────────────────────────
      - name: "[Video] Run video-clip pipeline — 1 Short"
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:      ${{ secrets.PIXABAY_API_KEY }}
          VIDEOS_PER_RUN:  "1"
          YOUTUBE_PRIVACY: "public"
        run: python main_video.py

      # ── Save both videos as artifacts (3-day retention for review) ────────────
      - name: Upload video artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 3
          if-no-files-found: ignore

      # ── Cleanup credentials ───────────────────────────────────────────────────
      - name: Remove credential files
        if: always()
        run: |
          rm -f client_secrets.json youtube_token.json
