name: Daily YouTube Shorts Upload

# ─────────────────────────────────────────────────────────────────────────────
# OPTIMAL UPLOAD SCHEDULE FOR INDIAN AUDIENCE (IST = UTC + 5:30)
#
# Research shows peak YouTube Shorts engagement for Indian viewers:
#   Slot 1 — Morning  : 7:30 AM IST  = 02:00 UTC  (morning commute / breakfast)
#   Slot 2 — Evening  : 7:30 PM IST  = 14:00 UTC  (after school/work prime time)
#
# Why two separate runs instead of one run with 2 videos:
#   - YouTube rewards consistent upload frequency over bulk uploads
#   - Spreading uploads lets algorithm push each video independently
#   - More chances to hit trending at different times of day
#
# Total: 2 videos per day, 1 per run
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Slot 1: 7:30 AM IST  (02:00 UTC) — morning audience
    - cron: "0 2 * * *"
    # Slot 2: 7:30 PM IST  (14:00 UTC) — evening prime time
    - cron: "0 14 * * *"
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  upload:
    name: Generate & Upload 1 YouTube Short
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ───────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── System deps (FFmpeg + fonts including Hindi Devanagari) ─────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            fonts-liberation \
            fonts-noto \
            fonts-noto-core \
            fonts-noto-cjk

      # ── Python deps ───────────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Credentials ───────────────────────────────────────────────────────────
      # These secrets are stored in GitHub → Settings → Secrets → Actions
      - name: Write YouTube credentials from secrets
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          echo "$YOUTUBE_CLIENT_SECRETS" > client_secrets.json
          echo "$YOUTUBE_TOKEN"          > youtube_token.json

      # ── Run pipeline — 1 video per slot ──────────────────────────────────────
      - name: Run automation pipeline
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:  ${{ secrets.PEXELS_API_KEY }}
          VIDEOS_PER_RUN:  "1"
          YOUTUBE_PRIVACY: "public"
        run: python main.py

      # ── Save generated video as artifact (3-day retention for review) ─────────
      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 3
          if-no-files-found: ignore

      # ── Cleanup credentials ───────────────────────────────────────────────────
      - name: Remove credential files
        if: always()
        run: |
          rm -f client_secrets.json youtube_token.json
