name: Daily YouTube Shorts — Photo Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# PHOTO PIPELINE — runs at slots 2, 4  (images + Ken Burns effect)
#
# Slot 2 —  9:00 AM IST = 03:30 UTC
# Slot 4 —  5:30 PM IST = 12:00 UTC
#
# Total: 2 photo shorts per day
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Slot 2:  9:00 AM IST (03:30 UTC)
    - cron: "30 3 * * *"
    # Slot 4:  5:30 PM IST (12:00 UTC)
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  upload-photo:
    name: Generate & Upload 1 Photo Short
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            fonts-liberation \
            fonts-noto \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-noto-extra

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write YouTube credentials from secrets
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          echo "$YOUTUBE_CLIENT_SECRETS" > client_secrets.json
          echo "$YOUTUBE_TOKEN"          > youtube_token.json

      - name: Run photo pipeline
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          VIDEOS_PER_RUN:  "1"
          YOUTUBE_PRIVACY: "public"
        run: python main.py

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: photo-short-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 3
          if-no-files-found: ignore

      - name: Remove credential files
        if: always()
        run: rm -f client_secrets.json youtube_token.json
