name: Daily YouTube Shorts — Photo Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# PHOTO PIPELINE — 1 upload/day at early morning hour
#
# Slot —  5:00 AM IST = 23:30 UTC (previous day)
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 5:00 AM IST (23:30 UTC) — early morning
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write   # needed to commit content history back to repo

jobs:
  upload-photo:
    name: Generate & Upload 1 Photo Short
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            fonts-liberation \
            fonts-noto \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-noto-extra

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Devanagari font for subtitles and thumbnails
        run: |
          mkdir -p assets/fonts
          # Try static bold first, then variable font (newer Ubuntu), then download
          FONT=$(find /usr/share/fonts -name "NotoSansDevanagari-Bold.ttf" 2>/dev/null | head -1)
          if [ -z "$FONT" ]; then
            FONT=$(find /usr/share/fonts -name "NotoSansDevanagari*.ttf" 2>/dev/null | head -1)
          fi
          if [ -n "$FONT" ]; then
            cp "$FONT" assets/fonts/NotoSansDevanagari-Bold.ttf
            echo "Font copied from: $FONT"
          else
            echo "Font not found in system, downloading..."
            curl -fsSL \
              "https://github.com/notofonts/devanagari/raw/main/fonts/NotoSansDevanagari/hinted/ttf/NotoSansDevanagari-Bold.ttf" \
              -o assets/fonts/NotoSansDevanagari-Bold.ttf \
              || echo "Download failed — falling back to system fontconfig"
          fi

      - name: Write YouTube credentials from secrets
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          echo "$YOUTUBE_CLIENT_SECRETS" > client_secrets.json
          echo "$YOUTUBE_TOKEN"          > youtube_token.json

      - name: Run photo pipeline
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_API_KEY:     ${{ secrets.YOUTUBE_API_KEY }}
          VIDEOS_PER_RUN:  "1"
          YOUTUBE_PRIVACY: "public"
        run: python main.py

      - name: Save content history to repo
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add content_history_youtube.json || true
          git diff --staged --quiet || git commit -m "chore: update youtube content history [skip ci]"
          git pull --rebase origin main || true
          git push || true

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: photo-short-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 3
          if-no-files-found: ignore

      - name: Remove credential files
        if: always()
        run: rm -f client_secrets.json youtube_token.json
