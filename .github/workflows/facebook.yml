name: Daily Facebook Reels Upload

# ─────────────────────────────────────────────────────────────────────────────
# OPTIMAL UPLOAD SCHEDULE FOR INDIAN AUDIENCE (IST = UTC + 5:30)
#
# Research shows peak Facebook Reels engagement for Indian viewers:
#   Slot 1 — Morning   : 8:30 AM IST  = 03:00 UTC  (morning scroll / breakfast)
#   Slot 2 — Afternoon : 2:00 PM IST  = 08:30 UTC  (lunch break browsing)
#   Slot 3 — Evening   : 8:00 PM IST  = 14:30 UTC  (prime time — after dinner)
#
# NOTE: Slot 2 is 08:30 UTC (not 08:00) to avoid collision with the YouTube
#       video pipeline which also runs at 08:00 UTC — prevents Gemini API
#       rate-limit conflicts on the free tier.
#
# Why three separate runs:
#   - Facebook rewards consistent posting frequency over bulk drops
#   - Each Reel gets its own algorithmic push window
#   - Covers all three peak engagement windows for maximum organic reach
#
# Total: 3 Reels per day, 1 per run
# ─────────────────────────────────────────────────────────────────────────────

# REQUIRED GITHUB SECRETS (Settings → Secrets and variables → Actions):
#
#   GEMINI_API_KEY              — Google Gemini API key (script + caption generation)
#   UNSPLASH_ACCESS_KEY         — Unsplash API key (stock images)
#   PEXELS_API_KEY              — Pexels API key (fallback stock images)
#   FACEBOOK_PAGE_ID            — Numeric ID of your Facebook Page
#                                 (find it at: facebook.com/your-page → About → Page ID)
#   FACEBOOK_PAGE_ACCESS_TOKEN  — Long-lived Page Access Token
#
# HOW TO GET A LONG-LIVED FACEBOOK PAGE ACCESS TOKEN:
#   1. Create a Facebook App at https://developers.facebook.com/
#   2. Add "Pages" product; request permissions:
#        pages_show_list, pages_read_engagement,
#        pages_manage_posts, pages_manage_videos
#   3. Get a short-lived user token from Graph API Explorer
#   4. Exchange for long-lived user token (valid 60 days):
#        GET https://graph.facebook.com/v21.0/oauth/access_token
#          ?grant_type=fb_exchange_token
#          &client_id={APP_ID}&client_secret={APP_SECRET}
#          &fb_exchange_token={SHORT_LIVED_TOKEN}
#   5. Get your Page token (never expires if from long-lived user token):
#        GET https://graph.facebook.com/v21.0/me/accounts
#          ?access_token={LONG_LIVED_USER_TOKEN}
#        Copy the "access_token" value for your page.
#   6. Save it as GitHub Secret: FACEBOOK_PAGE_ACCESS_TOKEN
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Slot 1: 8:30 AM IST  (03:00 UTC) — morning scroll
    - cron: "0 3 * * *"
    # Slot 2: 2:00 PM IST  (08:30 UTC) — lunch break  ← 30 min after YouTube slot
    - cron: "30 8 * * *"
    # Slot 3: 8:00 PM IST  (14:30 UTC) — evening prime time
    - cron: "30 14 * * *"
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write   # needed to commit content history back to repo

jobs:
  upload:
    name: Generate & Upload 1 Facebook Reel
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ───────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── System deps (FFmpeg + fonts including Hindi Devanagari) ─────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            fonts-liberation \
            fonts-noto \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-noto-extra

      # ── Python deps ───────────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Devanagari font (for subtitles + thumbnails) ──────────────────────────
      - name: Set up Devanagari font for subtitles and thumbnails
        run: |
          mkdir -p assets/fonts
          # Try static bold first, then variable font (newer Ubuntu), then download
          FONT=$(find /usr/share/fonts -name "NotoSansDevanagari-Bold.ttf" 2>/dev/null | head -1)
          if [ -z "$FONT" ]; then
            FONT=$(find /usr/share/fonts -name "NotoSansDevanagari*.ttf" 2>/dev/null | head -1)
          fi
          if [ -n "$FONT" ]; then
            cp "$FONT" assets/fonts/NotoSansDevanagari-Bold.ttf
            echo "Font copied from: $FONT"
          else
            echo "Font not found in system, downloading..."
            curl -fsSL \
              "https://github.com/notofonts/devanagari/raw/main/fonts/NotoSansDevanagari/hinted/ttf/NotoSansDevanagari-Bold.ttf" \
              -o assets/fonts/NotoSansDevanagari-Bold.ttf \
              || echo "Download failed — falling back to system fontconfig"
          fi

      # ── Run pipeline — 1 Reel per slot ───────────────────────────────────────
      - name: Run Facebook Reels automation pipeline
        env:
          GEMINI_API_KEY:                ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY:           ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY:                ${{ secrets.PEXELS_API_KEY }}
          FACEBOOK_PAGE_ID:              ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN:    ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          VIDEOS_PER_RUN: "1"
        run: python main_facebook.py

      # ── Persist Facebook content history so topics don't repeat ──────────────
      - name: Save content history to repo
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add content_history_facebook.json || true
          git diff --staged --quiet || git commit -m "chore: update facebook content history [skip ci]"
          git pull --rebase origin main || true
          git push || true

      # ── Save generated video as artifact (3-day retention for review) ─────────
      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fb-reel-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 3
          if-no-files-found: ignore
